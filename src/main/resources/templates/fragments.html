<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Student Management System'">Student Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <!-- Sidebar Fragment -->
    <nav th:fragment="sidebar(activePage)" class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>SMS Pro</span>
        </div>
        <ul class="nav-list">
            <li>
                <a th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a th:href="@{/students}" th:classappend="${activePage == 'students' ? 'active' : ''}">
                    <i class="fa-solid fa-users"></i>
                    <span>Students</span>
                </a>
            </li>
            <li>
                <a th:href="@{/courses}" th:classappend="${activePage == 'courses' ? 'active' : ''}">
                    <i class="fa-solid fa-book"></i>
                    <span>Courses</span>
                </a>
            </li>
            <li>
                <a th:href="@{/departments}" th:classappend="${activePage == 'departments' ? 'active' : ''}">
                    <i class="fa-solid fa-building"></i>
                    <span>Departments</span>
                </a>
            </li>
            <li>
                <a th:href="@{/reports}" th:classappend="${activePage == 'reports' ? 'active' : ''}">
                    <i class="fa-solid fa-file-invoice"></i>
                    <span>Reports</span>
                </a>
            </li>
            <li>
                <a th:href="@{/settings}" th:classappend="${activePage == 'settings' ? 'active' : ''}">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Header Fragment -->
    <header th:fragment="header" class="top-header">
        <div class="header-left">
            <!-- Mobile menu toggle button could go here -->
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="theme-toggle" title="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=4f46e5&color=fff" alt="Admin" class="avatar">
                <span>Admin</span>
            </div>
        </div>
    </header>

</body>
</html>
