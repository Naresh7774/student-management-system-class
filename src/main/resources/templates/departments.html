<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Departments')}"></head>
<body>

<div class="layout-wrapper">
    <!-- Sidebar -->
    <div th:replace="~{fragments :: sidebar('departments')}"></div>

    <div class="main-content">
        <!-- Header -->
        <div th:replace="~{fragments :: header}"></div>

        <div class="page-content">
            <div class="action-bar">
                <div>
                    <h1 class="page-title">Departments</h1>
                    <p class="text-muted">Manage university departments</p>
                </div>
                <a th:href="@{/departments/new}" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add Department</a>
            </div>

            <!-- Filter & Search Bar -->
            <div class="card search-card mb-4">
                <form th:action="@{/departments}" class="search-form">
                    <div class="search-input-group">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search departments or heads..." class="search-input" />
                    </div>
                    <button type="submit" class="btn btn-primary">Search</button>
                    <a th:if="${keyword != null and !keyword.isEmpty()}" th:href="@{/departments}" class="btn btn-secondary">Clear</a>
                </form>
            </div>

            <div class="table-container card">
                <table class="table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Head of Department</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="department : ${departments}">
                        <td class="text-muted" th:text="${'#' + department.id}"></td>
                        <td class="font-weight-500" th:text="${department.name}"></td>
                        <td th:text="${department.description}"></td>
                        <td><span class="badge" th:text="${department.headOfDepartment}"></span></td>
                        <td class="action-buttons">
                            <a th:href="@{/departments/edit/{id}(id=${department.id})}" class="btn btn-secondary btn-sm" title="Edit"><i class="fa-solid fa-pen-to-square"></i></a>
                            <a th:href="@{/departments/delete/{id}(id=${department.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this department?')" title="Delete"><i class="fa-solid fa-trash"></i></a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(departments)}">
                        <td colspan="5" class="text-center empty-state">
                            <i class="fa-regular fa-folder-open empty-icon"></i>
                            <p>No departments found matching your criteria.</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
                
                <!-- Pagination -->
                <div class="pagination-container" th:if="${totalPages > 1}">
                    <div class="pagination-info">
                        Showing page <span th:text="${currentPage}"></span> of <span th:text="${totalPages}"></span> 
                        (<span th:text="${totalItems}"></span> total records)
                    </div>
                    <ul class="pagination">
                        <!-- Previous Page -->
                        <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/departments(pageNo=${currentPage - 1}, keyword=${keyword})}"><i class="fa-solid fa-chevron-left"></i> Prev</a>
                        </li>
                        
                        <!-- Page Numbers -->
                        <li th:each="i : ${#numbers.sequence(1, totalPages)}" class="page-item" th:classappend="${currentPage == i ? 'active' : ''}">
                            <a class="page-link" th:href="@{/departments(pageNo=${i}, keyword=${keyword})}" th:text="${i}">1</a>
                        </li>
                        
                        <!-- Next Page -->
                        <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/departments(pageNo=${currentPage + 1}, keyword=${keyword})}">Next <i class="fa-solid fa-chevron-right"></i></a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
