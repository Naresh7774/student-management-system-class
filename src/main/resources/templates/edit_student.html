<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Student | Student Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

<div class="dashboard-container">
    <header class="header form-header">
        <h1><i class="fa-solid fa-user-pen"></i> Edit Student</h1>
        <p>Update information for <span th:text="${student.name}"></span></p>
    </header>

    <div class="content form-content">
        <div class="card">
            <form th:action="@{/students/{id}(id=${student.id})}" th:object="${student}" method="post" class="form">
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-with-icon">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="name" th:field="*{name}" />
                    </div>
                    <p class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-with-icon">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" th:field="*{email}" />
                    </div>
                    <p class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>

                <div class="form-group">
                    <label for="course">Course</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-book"></i>
                        <input type="text" id="course" th:field="*{course}" />
                    </div>
                    <p class="error-msg" th:if="${#fields.hasErrors('course')}" th:errors="*{course}"></p>
                </div>

                <div class="form-group">
                    <label for="department">Department</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-building"></i>
                        <input type="text" id="department" th:field="*{department}" />
                    </div>
                    <p class="error-msg" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></p>
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-phone"></i>
                        <input type="text" id="phoneNumber" th:field="*{phoneNumber}" />
                    </div>
                    <p class="error-msg" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></p>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block"><i class="fa-solid fa-save"></i> Update Details</button>
                    <a th:href="@{/students}" class="btn btn-secondary btn-block text-center mt-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
