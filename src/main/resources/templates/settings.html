<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Settings')}"></head>
<body>

<div class="layout-wrapper">
    <!-- Sidebar -->
    <div th:replace="~{fragments :: sidebar('settings')}"></div>

    <div class="main-content">
        <!-- Header -->
        <div th:replace="~{fragments :: header}"></div>

        <div class="page-content">
            <h1 class="page-title">Application Settings</h1>
            <p class="text-muted">Manage your preferences and configurations</p>

            <div class="card mt-4 p-4">
                <h2 style="margin-bottom: 1rem;"><i class="fa-solid fa-user-shield"></i> Account Settings</h2>
                <form>
                    <div class="form-group">
                        <label>Admin Name</label>
                        <input type="text" class="form-control" value="Admin User" />
                    </div>
                    <div class="form-group">
                        <label>Admin Email</label>
                        <input type="email" class="form-control" value="admin@smspro.com" />
                    </div>
                    <button type="button" class="btn btn-primary mt-2">Update Profile</button>
                </form>
            </div>

            <div class="card mt-4 p-4">
                <h2 style="margin-bottom: 1rem;"><i class="fa-solid fa-bell"></i> Notifications</h2>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" checked>
                        <span>Email me when a new student is registered</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" checked>
                        <span>Send weekly system summary reports</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox">
                        <span>Enable SMS notifications</span>
                    </label>
                </div>
                <button type="button" class="btn btn-secondary mt-4">Save Preferences</button>
            </div>

            <div class="card mt-4 p-4 border-danger">
                <h2 style="margin-bottom: 1rem; color: var(--danger-color);"><i class="fa-solid fa-triangle-exclamation"></i> Danger Zone</h2>
                <p class="text-muted mb-4">Actions here are irreversible. Please be certain.</p>
                <button type="button" class="btn btn-danger" onclick="alert('This action is disabled in demo mode.')">Reset Entire Database</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
