<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Add Department')}"></head>
<body>

<div class="layout-wrapper">
    <!-- Sidebar -->
    <div th:replace="~{fragments :: sidebar('departments')}"></div>

    <div class="main-content">
        <!-- Header -->
        <div th:replace="~{fragments :: header}"></div>

        <div class="page-content">
            <header class="header form-header">
                <h1><i class="fa-solid fa-plus-circle"></i> Add New Department</h1>
                <p>Enter the details for a new department</p>
            </header>

            <div class="card form-card">
                <div class="form-body">
                    <form th:action="@{/departments}" th:object="${department}" method="POST">

                        <div class="form-group">
                            <label>Department Name</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Computer Science"/>
                            <p class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                        </div>

                        <div class="form-group">
                            <label>Description</label>
                            <textarea th:field="*{description}" class="form-control" placeholder="Department description..." rows="3"></textarea>
                            <p class="error-text" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
                        </div>

                        <div class="form-group">
                            <label>Head of Department</label>
                            <input type="text" th:field="*{headOfDepartment}" class="form-control" placeholder="e.g. Dr. Alan Turing"/>
                            <p class="error-text" th:if="${#fields.hasErrors('headOfDepartment')}" th:errors="*{headOfDepartment}"></p>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Save Department</button>
                            <a th:href="@{/departments}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
