<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Reports')}"></head>
<body>

<div class="layout-wrapper">
    <!-- Sidebar -->
    <div th:replace="~{fragments :: sidebar('reports')}"></div>

    <div class="main-content">
        <!-- Header -->
        <div th:replace="~{fragments :: header}"></div>

        <div class="page-content">
            <h1 class="page-title">Generate Reports</h1>
            <p class="text-muted">Export data and view advanced analytics</p>

            <div class="dashboard-cards">
                <div class="card stat-card primary-card">
                    <div class="stat-icon">
                        <i class="fa-solid fa-file-pdf"></i>
                    </div>
                    <div class="stat-details">
                        <h3>Students Report</h3>
                        <p class="mt-2"><button class="btn btn-sm btn-primary">Download PDF</button></p>
                    </div>
                </div>
                
                <div class="card stat-card success-card">
                    <div class="stat-icon">
                        <i class="fa-solid fa-file-csv"></i>
                    </div>
                    <div class="stat-details">
                        <h3>Course Enrollment</h3>
                        <p class="mt-2"><button class="btn btn-sm btn-primary">Download CSV</button></p>
                    </div>
                </div>

                <div class="card stat-card warning-card">
                    <div class="stat-icon">
                        <i class="fa-solid fa-file-excel"></i>
                    </div>
                    <div class="stat-details">
                        <h3>Department Roster</h3>
                        <p class="mt-2"><button class="btn btn-sm btn-primary">Download Excel</button></p>
                    </div>
                </div>
            </div>

            <div class="card mt-4 p-4">
                <h2>Custom Report</h2>
                <p class="text-muted mb-4">Select parameters to generate a custom report.</p>
                <form>
                    <div style="display: flex; gap: 1rem; align-items: end;">
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label>Report Type</label>
                            <select class="form-control">
                                <option>Attendance</option>
                                <option>Grades</option>
                                <option>Financial</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label>Date Range</label>
                            <input type="date" class="form-control">
                        </div>
                        <button type="button" class="btn btn-secondary">Generate</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
