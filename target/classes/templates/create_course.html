<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Add Course')}"></head>
<body>

<div class="layout-wrapper">
    <!-- Sidebar -->
    <div th:replace="~{fragments :: sidebar('courses')}"></div>

    <div class="main-content">
        <!-- Header -->
        <div th:replace="~{fragments :: header}"></div>

        <div class="page-content">
            <header class="header form-header">
                <h1><i class="fa-solid fa-plus-circle"></i> Add New Course</h1>
                <p>Enter the details for a new course</p>
            </header>

            <div class="card form-card">
                <div class="form-body">
                    <form th:action="@{/courses}" th:object="${course}" method="POST">

                        <div class="form-group">
                            <label>Course Name</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Introduction to Computer Science"/>
                            <p class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                        </div>

                        <div class="form-group">
                            <label>Description</label>
                            <textarea th:field="*{description}" class="form-control" placeholder="Course description..." rows="3"></textarea>
                            <p class="error-text" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
                        </div>

                        <div class="form-group">
                            <label>Credits</label>
                            <input type="number" th:field="*{credits}" class="form-control" placeholder="e.g. 3" min="1" max="10"/>
                            <p class="error-text" th:if="${#fields.hasErrors('credits')}" th:errors="*{credits}"></p>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Save Course</button>
                            <a th:href="@{/courses}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
